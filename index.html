<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 包剪揼辨識器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        .animate-scan {
            animation: scan 2.5s linear infinite;
        }
        .video-mirror {
            transform: scaleX(-1);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center p-4 font-sans">

    <header class="w-full max-w-md text-center mb-6">
        <div class="flex justify-center mb-2">
            <div class="bg-blue-100 p-3 rounded-2xl">
                <i class="fas fa-hand-pointer text-blue-600 text-xl"></i>
            </div>
        </div>
        <h1 class="text-3xl font-bold text-slate-800">包剪揼辨識器</h1>
        <p class="text-slate-500 mt-1 text-sm">HTML + AI 視覺辨識版本</p>
    </header>

    <main class="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden relative">
        <!-- 相機/照片預覽區域 -->
        <div class="aspect-[3/4] bg-slate-900 relative flex items-center justify-center overflow-hidden">
            <video id="video" autoplay playsinline muted class="w-full h-full object-cover video-mirror"></video>
            <img id="photo-preview" class="w-full h-full object-cover video-mirror hidden" alt="Captured Photo">
            
            <!-- 掃描動畫 -->
            <div id="scan-line" class="absolute inset-0 z-10 hidden">
                <div class="w-full h-1 bg-blue-400 opacity-70 absolute top-0 animate-scan shadow-[0_0_15px_rgba(96,165,250,0.8)]"></div>
                <div class="absolute inset-0 bg-blue-500/10 animate-pulse"></div>
            </div>

            <!-- 錯誤提示 -->
            <div id="error-overlay" class="absolute inset-0 bg-slate-900/90 flex flex-col items-center justify-center p-6 text-center z-20 hidden">
                <i class="fas fa-exclamation-triangle text-red-500 text-4xl mb-4"></i>
                <p id="error-message" class="text-white font-medium"></p>
                <button onclick="startCamera()" class="mt-4 px-6 py-2 bg-white text-slate-900 rounded-xl text-sm font-bold active:scale-95 transition-transform">
                    重試相機
                </button>
            </div>
        </div>

        <!-- 結果顯示區域 -->
        <div id="result-area" class="p-6 min-h-[200px] flex flex-col justify-center border-b border-slate-50">
            <!-- 初始狀態 -->
            <div id="status-initial" class="flex flex-col items-center text-slate-400">
                <div class="w-16 h-16 border-2 border-dashed border-slate-200 rounded-full flex items-center justify-center mb-4">
                    <i class="fas fa-hand-rock opacity-20 text-2xl"></i>
                </div>
                <p class="font-medium text-slate-500">準備好了嗎？</p>
                <p class="text-xs mt-1">擺出手勢並按下方的按鈕</p>
            </div>

            <!-- 載入狀態 -->
            <div id="status-loading" class="flex flex-col items-center hidden">
                <div class="relative w-12 h-12 mb-4">
                    <div class="absolute inset-0 border-4 border-blue-100 rounded-full"></div>
                    <div class="absolute inset-0 border-4 border-blue-600 rounded-full border-t-transparent animate-spin"></div>
                </div>
                <p class="text-blue-600 font-bold animate-pulse">AI 正在思考中...</p>
                <p class="text-xs text-slate-400 mt-1">分析影像特徵中</p>
            </div>

            <!-- 結果狀態 -->
            <div id="status-result" class="flex flex-col items-center hidden">
                <div id="result-icon-bg" class="mb-3 bg-slate-50 p-5 rounded-2xl border border-slate-100 shadow-inner">
                    <i id="result-icon" class="fas text-4xl"></i>
                </div>
                <h2 id="result-gesture" class="text-3xl font-black text-slate-800 tracking-tight"></h2>
                <div class="mt-3 flex items-center gap-2">
                    <div class="h-1.5 w-20 bg-slate-100 rounded-full overflow-hidden">
                        <div id="confidence-bar" class="h-full bg-green-500" style="width: 0%"></div>
                    </div>
                    <span id="confidence-text" class="text-xs font-bold text-slate-400">0% 信心度</span>
                </div>
                <p id="result-explanation" class="text-slate-500 mt-4 text-center text-sm leading-relaxed max-w-[260px] italic"></p>
            </div>
        </div>

        <!-- 控制按鈕 -->
        <div class="p-4 bg-slate-50">
            <button id="btn-capture" onclick="captureAndAnalyze()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-3 transition-all active:scale-95 shadow-lg shadow-blue-100">
                <i class="fas fa-camera"></i>
                <span>拍照辨識</span>
            </button>
            <button id="btn-reset" onclick="resetUI()" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-3 transition-all active:scale-95 shadow-lg hidden">
                <i class="fas fa-redo"></i>
                <span>再玩一次</span>
            </button>
        </div>
    </main>

    <footer class="mt-8 text-slate-400 text-[10px] uppercase tracking-widest text-center max-w-xs leading-relaxed">
        影像技術由 Gemini 2.5 Flash 提供
    </footer>

    <canvas id="canvas" class="hidden"></canvas>

    <script>
        const apiKey = ""; // 執行環境提供
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const photoPreview = document.getElementById('photo-preview');
        const errorOverlay = document.getElementById('error-overlay');
        const errorMessage = document.getElementById('error-message');
        const scanLine = document.getElementById('scan-line');

        const statusInitial = document.getElementById('status-initial');
        const statusLoading = document.getElementById('status-loading');
        const statusResult = document.getElementById('status-result');

        const btnCapture = document.getElementById('btn-capture');
        const btnReset = document.getElementById('btn-reset');

        let stream = null;

        // 初始化相機
        async function startCamera() {
            try {
                errorOverlay.classList.add('hidden');
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } } 
                });
                video.srcObject = stream;
                console.log("Camera started successfully");
            } catch (err) {
                console.error("Error accessing camera:", err);
                errorOverlay.classList.remove('hidden');
                errorMessage.textContent = "無法存取相機，請確保已開啟瀏覽器權限。";
            }
        }

        // 拍照並呼叫 API
        async function captureAndAnalyze() {
            if (!stream) return;

            // 1. 擷取畫面
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const base64Data = canvas.toDataURL('image/png').split(',')[1];

            // 2. 更新 UI
            photoPreview.src = canvas.toDataURL('image/png');
            photoPreview.classList.remove('hidden');
            video.classList.add('hidden');
            scanLine.classList.remove('hidden');
            
            statusInitial.classList.add('hidden');
            statusLoading.classList.remove('hidden');
            btnCapture.classList.add('hidden');

            // 3. AI 辨識
            await callGeminiAI(base64Data);
        }

        async function callGeminiAI(base64Data) {
            const systemPrompt = "你是一個專業的手勢辨識助手。請分析圖片中的手勢，判斷它是「剪刀」、「石頭」還是「布」。請僅以 JSON 格式回傳：{ \"gesture\": \"剪刀/石頭/布/無法辨識\", \"confidence\": 0.95, \"explanation\": \"簡短判斷理由\" }";
            
            let retries = 0;
            const maxRetries = 5;

            async function attempt() {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: "辨識這張照片中的包剪揼手勢。" },
                                    { inlineData: { mimeType: "image/png", data: base64Data } }
                                ]
                            }],
                            systemInstruction: { parts: [{ text: systemPrompt }] },
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });

                    if (!response.ok) throw new Error("API 回應異常");

                    const data = await response.json();
                    const resultText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    const result = JSON.parse(resultText);
                    showResult(result);
                } catch (err) {
                    if (retries < maxRetries) {
                        retries++;
                        const delay = Math.pow(2, retries) * 1000;
                        setTimeout(attempt, delay);
                    } else {
                        handleError("辨識失敗，可能是網路不穩定。");
                    }
                }
            }

            attempt();
        }

        function showResult(data) {
            scanLine.classList.add('hidden');
            statusLoading.classList.add('hidden');
            statusResult.classList.remove('hidden');
            btnReset.classList.remove('hidden');

            const gesture = data.gesture;
            document.getElementById('result-gesture').textContent = gesture;
            document.getElementById('result-explanation').textContent = data.explanation;
            
            const confPercent = Math.round(data.confidence * 100);
            document.getElementById('confidence-text').textContent = `${confPercent}% 信心度`;
            document.getElementById('confidence-bar').style.width = `${confPercent}%`;

            // 設定圖示
            const iconEl = document.getElementById('result-icon');
            const iconBg = document.getElementById('result-icon-bg');
            iconEl.className = 'fas text-4xl';
            
            if (gesture.includes('剪刀')) {
                iconEl.classList.add('fa-hand-scissors', 'text-blue-500');
            } else if (gesture.includes('石頭')) {
                iconEl.classList.add('fa-hand-rock', 'text-slate-700');
            } else if (gesture.includes('布')) {
                iconEl.classList.add('fa-hand-paper', 'text-green-500');
            } else {
                iconEl.classList.add('fa-question-circle', 'text-yellow-500');
            }
        }

        function handleError(msg) {
            scanLine.classList.add('hidden');
            statusLoading.classList.add('hidden');
            statusInitial.classList.remove('hidden');
            btnCapture.classList.remove('hidden');
            alert(msg);
        }

        function resetUI() {
            photoPreview.classList.add('hidden');
            video.classList.remove('hidden');
            statusResult.classList.add('hidden');
            statusInitial.classList.remove('hidden');
            btnReset.classList.add('hidden');
            btnCapture.classList.remove('hidden');
            
            // 確保影片播放
            if (video.paused) video.play().catch(() => {});
        }

        // 初始化
        window.onload = startCamera;
    </script>
</body>
</html>
